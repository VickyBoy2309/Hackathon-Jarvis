<!doctype html>
<html>
  <head>
    <title>Movie Maniac</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <nav>
      <h1>🎬 Movie Maniac</h1>

      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
      </ul>
    </nav>

    <div class="container">
      <h2>Popular Movies</h2>

      <div class="movie-grid">
        <div class="movie-card">
          <img src="https://via.placeholder.com/200x300" />
          <h3>Inception</h3>
          <button onclick="addWishlist('Inception')">Wishlist</button>
          <button onclick="addWatched('Inception')">Watched</button>
        </div>

        <div class="movie-card">
          <img src="https://via.placeholder.com/200x300" />
          <h3>Interstellar</h3>
          <button onclick="addWishlist('Interstellar')">Wishlist</button>
          <button onclick="addWatched('Interstellar')">Watched</button>
        </div>

        <div class="movie-card">
          <img src="https://via.placeholder.com/200x300" />
          <h3>John Wick</h3>
          <button onclick="addWishlist('John Wick')">Wishlist</button>
          <button onclick="addWatched('John Wick')">Watched</button>
        </div>
      </div>
    </div>
    <div id="movieCarousel" class="carousel slide" data-bs-ride="carousel">

<!-- Indicators -->
<div class="carousel-indicators">
<button type="button" data-bs-target="#movieCarousel" data-bs-slide-to="0" class="active"></button>
<button type="button" data-bs-target="#movieCarousel" data-bs-slide-to="1"></button>
<button type="button" data-bs-target="#movieCarousel" data-bs-slide-to="2"></button>
</div>

<!-- Slides -->
<div class="carousel-inner">

<!-- Movie 1 -->
<div class="carousel-item active" data-bs-interval="3000">
<img src="./MM1.jpg" class="d-block w-100" alt="Movie 1">

<div class="carousel-caption d-none d-md-block">
<h5>Movie Title 1</h5>
<p>A short description about this movie.</p>
</div>

</div>

<!-- Movie 2 -->
<div class="carousel-item" data-bs-interval="3000">
<img src="images/movie2.jpg" class="d-block w-100" alt="Movie 2">

<div class="carousel-caption d-none d-md-block">
<h5>Movie Title 2</h5>
<p>Description about the second movie.</p>
</div>

</div>

<!-- Movie 3 -->
<div class="carousel-item" data-bs-interval="3000">
<img src="images/movie3.jpg" class="d-block w-100" alt="Movie 3">

<div class="carousel-caption d-none d-md-block">
<h5>Movie Title 3</h5>
<p>Description about the third movie.</p>
</div>

</div>

</div>

<!-- Previous Button -->
<button class="carousel-control-prev" type="button" data-bs-target="#movieCarousel" data-bs-slide="prev">
<span class="carousel-control-prev-icon"></span>
</button>

<!-- Next Button -->
<button class="carousel-control-next" type="button" data-bs-target="#movieCarousel" data-bs-slide="next">
<span class="carousel-control-next-icon"></span>
</button>

</div>

    <script src="js/movies.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
